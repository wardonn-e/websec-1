<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="calculator">
    <div class="input-group">
        <div class="field">
            <input type="number" id="num1" required step="any">
            <div class="error-message" id="error1"></div>
        </div>

        <div class="select-wrapper">
            <select id="operation">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">×</option>
                <option value="/">÷</option>
            </select>
        </div>

        <div class="field">
            <input type="number" id="num2" required step="any">
            <div class="error-message" id="error2"></div>
        </div>
    </div>

    <button id="calculate">подсчитать</button>

    <div class="results">
        <div id="current-result" class="current-result"></div>
        <div id="history" class="history"></div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
